{% extends 'base.html' %}
{% block title %}상품 등록{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4">상품 등록</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">상품명 <span class="text-danger">*</span></label>
            <input class="form-control" type="text" name="name" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">가격 (원) <span class="text-danger">*</span></label>
            <input class="form-control" type="number" name="price" min="0" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">상품 설명</label>
            <textarea class="form-control" name="description" rows="4" placeholder="상품에 대해 자세히 설명해주세요."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">이미지 URL (선택)</label>
            <input class="form-control" type="url" name="image_url" placeholder="https://...">
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-success flex-grow-1" type="submit">등록하기</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">취소</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
