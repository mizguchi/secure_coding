{% extends 'base.html' %}
{% block title %}송금{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1"><i class="bi bi-send"></i> 송금</h5>
        <p class="text-muted mb-4">현재 잔액: <strong class="text-success">{{ "{:,}".format(user['balance']) }}원</strong></p>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">받는 사람</label>
            <select class="form-select" name="receiver_username" required>
              <option value="">-- 선택 --</option>
              {% for u in users %}
                <option value="{{ u['username'] }}">{{ u['username'] }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">금액 (원)</label>
            <input class="form-control" type="number" name="amount" min="1" placeholder="0" required>
          </div>
          <button class="btn btn-success w-100" type="submit">송금하기</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
