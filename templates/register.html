{% extends 'base.html' %}
{% block title %}회원가입{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-4 fw-bold">회원가입</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">아이디</label>
            <input class="form-control" type="text" name="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">비밀번호</label>
            <input class="form-control" type="password" name="password" required>
          </div>
          <button class="btn btn-success w-100" type="submit">가입하기</button>
        </form>
        <hr>
        <p class="text-center mb-0">이미 계정이 있나요? <a href="{{ url_for('login') }}">로그인</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
